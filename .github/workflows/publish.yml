name: Publish

on:
  release:
    types: [published]

permissions: {}

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  build-native:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_arch: x64
            node_os: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            node_arch: arm64
            node_os: darwin
          - os: macos-14
            target: x86_64-apple-darwin
            node_arch: x64
            node_os: darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_arch: x64
            node_os: win32

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/codegraph-core

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@3

      - name: Build native addon
        working-directory: crates/codegraph-core
        run: napi build --release --target ${{ matrix.target }}

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.node_os }}-${{ matrix.node_arch }}
          path: crates/codegraph-core/*.node
          if-no-files-found: error

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          git checkout -- package-lock.json
          CURRENT=$(node -p "require('./package.json').version")

          # Extract version from the release tag
          TAG="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${TAG#v}"
          if [ "$CURRENT" != "$RELEASE_VERSION" ]; then
            echo "::warning::package.json ($CURRENT) doesn't match release tag ($TAG) — bumping to match"
            npx commit-and-tag-version --release-as "$RELEASE_VERSION" --skip.tag --skip.changelog
          else
            echo "Version $CURRENT already matches tag $TAG"
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Will publish version $NEW_VERSION"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify version not already on npm
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          PKG="@optave/codegraph"
          echo "Checking if $PKG@$VERSION already exists on npm..."
          if npm view "$PKG@$VERSION" version 2>/dev/null; then
            echo "::error::$PKG@$VERSION is already published on npm. Bump to a higher version."
            exit 1
          fi
          echo "$PKG@$VERSION is not yet published — proceeding"

      - name: Publish platform packages
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"

          declare -A PACKAGES=(
            ["linux-x64"]="@optave/codegraph-linux-x64-gnu"
            ["darwin-arm64"]="@optave/codegraph-darwin-arm64"
            ["darwin-x64"]="@optave/codegraph-darwin-x64"
            ["win32-x64"]="@optave/codegraph-win32-x64-msvc"
          )

          for artifact_dir in artifacts/native-*/; do
            platform=$(basename "$artifact_dir" | sed 's/^native-//')
            pkg_name=${PACKAGES[$platform]}
            node_os=${platform%%-*}
            node_arch=${platform##*-}

            mkdir -p "pkg/$platform"
            cp "$artifact_dir"/*.node "pkg/$platform/codegraph-core.node"

            cat > "pkg/$platform/package.json" <<PKGJSON
          {
            "name": "${pkg_name}",
            "version": "${VERSION}",
            "description": "Native codegraph-core binary for ${node_os}-${node_arch}",
            "os": ["${node_os}"],
            "cpu": ["${node_arch}"],
            "main": "codegraph-core.node",
            "files": ["codegraph-core.node"],
            "license": "Apache-2.0",
            "repository": {
              "type": "git",
              "url": "https://github.com/optave/codegraph.git"
            }
          }
          PKGJSON

            echo "Publishing ${pkg_name}@${VERSION}"
            npm publish "./pkg/$platform" --access public --provenance --tag latest
          done

      - name: Disable prepublishOnly
        run: npm pkg set scripts.prepublishOnly=""

      - name: Publish main package
        run: npm publish --access public --provenance --tag latest

      - name: Push version bump via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v${VERSION}"
          BRANCH="release/v${VERSION}"

          # Check if there are version bump changes to push
          if git diff --quiet HEAD; then
            echo "No version bump commit to push — skipping PR"
          else
            git push origin "HEAD:refs/heads/${BRANCH}"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: release v${VERSION}" \
              --body "Automated version bump to \`${VERSION}\` and CHANGELOG update from publish workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            echo "::notice::Version bump PR created for ${BRANCH} → main"
          fi

          # Push tag (skip if it already exists on remote)
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists on remote — skipping tag push"
          else
            git tag -a "$TAG" -m "release: $TAG"
            git push origin "$TAG"
          fi
